<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Wizzme · Story (arc · v6)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a0a0a;
  --body:#2a2a2a;
  --muted:#6b6b6b;
  --faint:#9a9a9a;
  --paper:#f7f6f2;
  --paper2:#efeee8;
  --paper3:#e6e4dc;
  --rule:#d4d4ce;
  --rule-soft:#eaeae4;
  --accent:#5b3df6;
  --accent-soft:#ece7ff;
  --wz:#ff3d2e;
  --wz-soft:#ffe4e0;
  --sans:'Inter','-apple-system',sans-serif;
  --mono:'IBM Plex Mono','SF Mono',monospace;
  --ease:cubic-bezier(.2,.65,.25,1);
}

*{box-sizing:border-box;}
html,body{margin:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  font-size:16px;
  padding-bottom:88px;       /* room for sticky ask button */
  min-height:100dvh;
}

/* ========== TOP BAR (sticky) ========== */
.top{
  position:sticky;top:0;z-index:50;
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;
  border-bottom:1px solid rgba(0,0,0,.05);
  background:rgba(247,246,242,.94);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}
.brand{
  display:flex;align-items:center;gap:9px;
  font-weight:800;font-size:14.5px;letter-spacing:-.01em;
}
.brand::before{
  content:'W';width:24px;height:24px;border-radius:6px;
  background:var(--ink);color:#fff;
  display:grid;place-items:center;
  font-weight:900;font-size:11px;
}
.brand .exp{
  font-family:var(--mono);font-size:9.5px;font-weight:500;
  color:var(--muted);letter-spacing:.14em;text-transform:uppercase;
  padding-left:8px;border-left:1px solid var(--rule);
}
.switcher{
  display:flex;gap:2px;padding:3px;
  background:var(--paper2);border-radius:7px;
  border:1px solid rgba(0,0,0,.04);
}
.switcher button{
  border:0;background:transparent;cursor:pointer;
  font-family:var(--sans);font-weight:600;font-size:12px;
  color:var(--muted);padding:5px 10px;border-radius:5px;
  transition:all .15s ease;
}
.switcher button.active{
  background:#fff;color:var(--ink);
  box-shadow:0 1px 2px rgba(0,0,0,.08);
}

/* ========== TITLE BAR (compact breadcrumb) ========== */
.titlebar{
  padding:10px 18px 10px;
  display:flex;align-items:center;gap:10px;
}
.tb-meta{
  display:flex;align-items:center;gap:9px;flex-shrink:0;
  font-family:var(--mono);font-size:10.5px;
  color:var(--muted);letter-spacing:.14em;text-transform:uppercase;
}
.tb-meta .avs{display:flex;margin-right:-2px;}
.tb-meta .av{
  width:20px;height:20px;border-radius:50%;
  background:var(--ink);color:#fff;
  display:grid;place-items:center;
  font-size:10px;font-weight:700;font-family:var(--sans);
  border:2px solid var(--paper);margin-right:-7px;
  letter-spacing:0;
}
.tb-meta .av.b{background:var(--accent);}
.tb-title{
  font-weight:500;font-size:10.5px;
  color:var(--faint);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  flex:1;min-width:0;text-align:right;
  font-family:var(--mono);
  text-transform:uppercase;letter-spacing:.14em;
}

/* ========== COVER (above the journey — title, sub, before→after) ========== */
.cover{
  padding:6px 20px 18px;
  background:var(--paper);
}
.cv-title{
  font-weight:900;font-size:28px;line-height:1.12;
  letter-spacing:-.025em;margin:0;color:var(--ink);
}
.cv-sub{
  font-size:16px;line-height:1.45;color:var(--body);
  margin:12px 0 0;
  font-weight:500;
  letter-spacing:-.003em;
}
.cv-arc{
  display:flex;align-items:stretch;gap:8px;
  margin-top:16px;
}
.cv-arc-side{
  flex:1;min-width:0;
  padding:11px 13px 12px;
  background:var(--paper2);
  border-radius:10px;
}
.cv-arc-side.after{background:var(--wz-soft);}
.cv-arc-label{
  font-family:var(--mono);font-size:10px;font-weight:600;
  color:var(--muted);letter-spacing:.18em;text-transform:uppercase;
  margin-bottom:5px;
}
.cv-arc-side.after .cv-arc-label{color:var(--wz);}
.cv-arc-text{
  font-weight:600;font-size:14px;line-height:1.35;
  letter-spacing:-.003em;color:var(--ink);
}
.cv-arc-connector{
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--muted);
  flex-shrink:0;width:16px;
  animation:conn-pulse 2.2s ease-in-out infinite;
}
@keyframes conn-pulse{
  0%,100%{opacity:.5;transform:translateX(0);}
  50%{opacity:1;transform:translateX(3px);}
}

/* ========== JOURNEY (the arc — flat moment dots, no phase brackets) ========== */
.journey{
  position:sticky;top:54px;z-index:30;
  padding:14px 20px 12px;
  background:rgba(247,246,242,.96);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--rule-soft);
  border-bottom:1px solid var(--rule-soft);
}
.jr-head{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:12px;
}
.jr-label{
  font-family:var(--mono);font-size:10.5px;
  color:var(--faint);letter-spacing:.15em;text-transform:uppercase;
  display:flex;align-items:center;gap:7px;
}
.jr-label .swipe-hint{
  color:var(--wz);font-weight:600;letter-spacing:.1em;
  display:inline-flex;align-items:center;gap:4px;
  animation:nudge-hint 2s ease-in-out infinite;
}
@keyframes nudge-hint{
  0%,100%{transform:translateX(0);opacity:.7;}
  50%{transform:translateX(4px);opacity:1;}
}
.jr-count{
  font-family:var(--mono);font-size:10.5px;
  color:var(--faint);letter-spacing:.08em;
}
.jr-strip{position:relative;padding:0 4px;}
.jr-line{
  position:absolute;
  left:14px;right:14px;top:6px;
  height:1.5px;background:var(--rule);
  border-radius:999px;
}
.jr-line::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg, var(--wz) 0%, var(--wz) var(--prog,0%), transparent var(--prog,0%));
  border-radius:inherit;
  transition:all .5s var(--ease);
}
.nodes{
  position:relative;
  display:grid;
  z-index:2;
}
.node{
  display:flex;flex-direction:column;align-items:center;
  gap:7px;
  border:0;background:transparent;
  padding:0 2px;cursor:pointer;
  font-family:inherit;color:inherit;
  position:relative;
}
.node:focus-visible{outline:none;}
.node-dot{
  width:12px;height:12px;border-radius:50%;
  background:var(--paper);
  border:2px solid var(--rule);
  transition:all .3s var(--ease);
}
.node:hover:not(.active) .node-dot{
  border-color:var(--ink);transform:scale(1.15);
}
.node.active .node-dot{
  width:16px;height:16px;margin:-2px 0;
  background:var(--wz);border-color:var(--wz);
  box-shadow:0 0 0 5px var(--wz-soft);
}
.node.passed .node-dot{
  background:var(--ink);border-color:var(--ink);
}
.node-label{
  font-family:var(--mono);font-size:9.5px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--faint);text-align:center;line-height:1.2;
  max-width:72px;
  transition:color .2s ease, font-weight .2s ease;
}
.node.active .node-label{color:var(--wz);font-weight:700;}
.node.passed .node-label{color:var(--muted);}

/* ========== STAGE (horizontal scroll-snap — Instagram-style) ========== */
.stage-wrap{
  position:relative;
}
.edge-fade{
  position:absolute;top:0;bottom:0;width:22px;
  pointer-events:none;z-index:2;
  opacity:0;transition:opacity .3s ease;
}
.edge-fade.l{left:0;background:linear-gradient(90deg, var(--paper), transparent);}
.edge-fade.r{right:0;background:linear-gradient(270deg, var(--paper), transparent);}
.stage-wrap.has-prev .edge-fade.l{opacity:1;}
.stage-wrap.has-next .edge-fade.r{opacity:1;}
.stage{
  position:relative;
  display:flex;flex-direction:row;
  align-items:flex-start;
  overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  scroll-snap-stop:always;
  overscroll-behavior-x:contain;
  touch-action:pan-x pan-y;
}
.stage::-webkit-scrollbar{display:none;}

.pane{
  flex:0 0 100%;
  width:100%;
  scroll-snap-align:start;
  scroll-snap-stop:always;
  padding:20px 20px 22px;
  display:flex;flex-direction:column;
}

/* --- MOMENT pane --- */
.pane-moment{gap:0;}
.mo-trail{
  display:flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:11px;
  color:var(--faint);letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:8px;
}
.mo-trail .idx{color:var(--wz);font-weight:600;}
.mo-label{
  font-family:var(--mono);font-size:11.5px;font-weight:500;
  color:var(--wz);letter-spacing:.18em;text-transform:uppercase;
  margin-bottom:8px;
}
.mo-title{
  font-weight:800;font-size:25px;line-height:1.18;
  letter-spacing:-.02em;margin:0 0 14px;color:var(--ink);
}
.mo-body{
  font-size:16px;line-height:1.58;color:var(--body);
  margin:0 0 18px;
}
.mo-quote{
  border-left:3px solid var(--wz);
  padding:4px 0 4px 14px;
  font-weight:700;font-size:17px;line-height:1.35;
  letter-spacing:-.012em;color:var(--ink);
  margin:0 0 18px;
}
.mo-quote .att{
  display:block;margin-top:8px;
  font-family:var(--mono);font-weight:400;font-size:10.5px;
  color:var(--muted);letter-spacing:.1em;text-transform:uppercase;
}
.mo-stat{
  display:inline-flex;flex-direction:column;
  background:var(--ink);color:#fff;
  padding:12px 16px;border-radius:10px;
  margin:0 0 18px;
}
.mo-stat .n{
  font-weight:900;font-size:22px;letter-spacing:-.022em;line-height:1;
}
.mo-stat .l{
  font-family:var(--mono);font-size:10px;
  color:rgba(255,255,255,.65);letter-spacing:.1em;
  margin-top:6px;text-transform:uppercase;
}

/* --- DROPDOWNS for in-moment sub-content --- */
.drops{
  display:flex;flex-direction:column;gap:8px;
  margin-top:6px;
}
.drop{
  background:var(--paper2);
  border:1px solid transparent;
  border-radius:10px;
  overflow:hidden;
  transition:background .18s, border-color .18s;
}
.drop-head{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:13px 15px;
  cursor:pointer;
  font-family:var(--sans);font-weight:600;font-size:15px;line-height:1.4;
  letter-spacing:-.005em;color:var(--ink);
  user-select:none;
}
.drop-head .chev{
  flex-shrink:0;
  font-size:14px;color:var(--muted);
  transition:transform .25s var(--ease);
  font-family:var(--mono);font-weight:600;
}
.drop.open .chev{transform:rotate(90deg);color:var(--wz);}
.drop.open{background:#fff;border-color:var(--wz);}
.drop.open .drop-head{font-weight:700;}
.drop-body{
  max-height:0;overflow:hidden;opacity:0;
  transition:max-height .3s var(--ease), opacity .2s, padding .3s var(--ease);
  padding:0 15px;
  font-size:14.5px;line-height:1.5;color:var(--body);
}
.drop.open .drop-body{
  max-height:260px;opacity:1;padding:0 15px 14px;
}
.drop-from{
  font-family:var(--mono);font-size:10px;font-weight:500;
  color:var(--muted);letter-spacing:.12em;text-transform:uppercase;
  padding-top:10px;margin-top:10px;
  border-top:1px solid var(--rule-soft);
}

.ins-hdr{
  display:flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:10.5px;font-weight:500;
  color:var(--muted);letter-spacing:.14em;text-transform:uppercase;
  margin:8px 0 10px;
}
.ins-hdr::before{
  content:'';width:14px;height:1px;background:var(--rule);
}

/* ========== PERSISTENT ASK (floating) ========== */
.ask{
  position:fixed;left:14px;right:14px;bottom:14px;z-index:60;
  background:var(--ink);color:#fff;
  padding:14px 20px 14px 18px;
  border:0;border-radius:999px;
  font-family:var(--sans);font-weight:500;font-size:14px;
  cursor:pointer;
  display:flex;align-items:center;gap:11px;
  box-shadow:0 10px 30px rgba(0,0,0,.22);
  transition:transform .15s ease, box-shadow .2s ease;
}
.ask:hover{transform:translateY(-1px);box-shadow:0 12px 34px rgba(0,0,0,.2);}
.ask:active{transform:translateY(0);}
.ask .dot{
  width:7px;height:7px;background:var(--wz);border-radius:50%;
  flex-shrink:0;
  animation:dotPulse 2s ease-in-out infinite;
  box-shadow:0 0 0 3px rgba(255,61,46,.2);
}
@keyframes dotPulse{0%,100%{opacity:1;}50%{opacity:.55;}}
.ask .label{flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ask .arr{opacity:.6;font-size:16px;}

/* ========== TOAST ========== */
.toast{
  position:fixed;bottom:72px;left:50%;
  transform:translate(-50%,6px);
  background:var(--ink);color:#fff;
  padding:10px 16px;border-radius:10px;
  font-family:var(--sans);font-weight:500;font-size:12.5px;
  box-shadow:0 10px 28px rgba(0,0,0,.22);
  opacity:0;pointer-events:none;z-index:200;
  transition:opacity .2s ease, transform .25s var(--ease);
  max-width:90vw;text-align:center;
}
.toast.show{opacity:1;transform:translate(-50%,0);}

/* ========== RESPONSIVE ========== */
@media (min-width:640px){
  body{font-size:17px;padding-bottom:96px;}
  .top,.titlebar{padding-left:24px;padding-right:24px;}
  .cover,.journey{padding-left:28px;padding-right:28px;max-width:760px;width:100%;margin:0 auto;}
  .stage{max-width:760px;width:100%;margin:0 auto;}
  .pane{padding:26px 28px 28px;}
  .ask{max-width:760px;left:50%;right:auto;transform:translateX(-50%);width:calc(100% - 40px);}
  .cv-title{font-size:34px;}
  .cv-sub{font-size:17.5px;}
  .cv-arc-text{font-size:15px;}
  .mo-title{font-size:28px;}
  .mo-body{font-size:17px;}
  .mo-quote{font-size:19px;}
  .drop-head{font-size:16px;}
  .drop-body{font-size:15.5px;}
}

*:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px;}
</style>
</head>

<header class="top">
  <div class="brand">Wizzme <span class="exp">arc · v6</span></div>
  <div class="switcher" id="switcher">
    <button data-story="aryan" class="active">Aryan</button>
    <button data-story="prathamesh">Prathamesh</button>

<section class="cover" id="cover"></section>

<section class="journey" id="journey"></section>

</button>

<div class="toast" id="toast"></div>

// ==========================
// STATE
// ==========================
let currentStory = 'aryan';
let currentPaneIdx = 0; // 0..N-1 (direct index into moments[])
let openDrop = null;

const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"']/g, c=>({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
}[c]));

function moments(){ return stories[currentStory].moments; }
function countDrops(s){
  return s.moments.reduce((a,m)=>a + (m.drops||[]).length, 0);
}

// ==========================
// RENDER: TITLE BAR
// ==========================
function renderTitleBar(){
  const s = stories[currentStory];
  const m = s.meta;
  const short = `${m.subject.split(' ')[0]} × ${m.interviewer.split(' ')[0]}`;
  $('titlebar').innerHTML = `
    <div class="tb-meta">
      <span class="avs">
        <span class="av">${esc(m.subjectInitial)}</span>
        <span class="av b">${esc(m.interviewerInitial)}</span>
      </span>
      <span>${esc(short)}</span>
    </div>
    <div class="tb-title">${esc(m.date)} · ${esc(m.duration)} · ${esc(m.turns)}</div>
  `;
}

// ==========================
// RENDER: COVER (title + hook + before→after — fixed above journey)
// ==========================
function renderCover(){
  const s = stories[currentStory];
  $('cover').innerHTML = `
    <h1 class="cv-title">${esc(s.title)}</h1>
    <p class="cv-sub">${esc(s.hook)}</p>
    <div class="cv-arc">
      <div class="cv-arc-side">
        <div class="cv-arc-label">Before</div>
        <div class="cv-arc-text">${esc(s.before || '')}</div>
      </div>
      <div class="cv-arc-connector">→</div>
      <div class="cv-arc-side after">
        <div class="cv-arc-label">After</div>
        <div class="cv-arc-text">${esc(s.after || '')}</div>
      </div>
    </div>
  `;
}

// ==========================
// RENDER: JOURNEY (flat moment dots — no phase brackets)
// ==========================
function renderJourney(){
  const s = stories[currentStory];
  const n = moments().length;
  const gridCols = `repeat(${n}, 1fr)`;
  const nodesHtml = moments().map((m, i) => `
    <button class="node" data-idx="${i}" type="button" aria-label="${esc(m.label)}">
      <span class="node-dot"></span>
      <span class="node-label">${esc(m.label)}</span>
    </button>
  `).join('');

  $('journey').innerHTML = `
    <div class="jr-head">
      <div class="jr-label">
        The journey
        <span class="swipe-hint">· swipe →</span>
      </div>
      <div class="jr-count">${n} moments · ${countDrops(s)} insights</div>
    </div>
    <div class="jr-strip">
      <div class="jr-line" id="jrLine"></div>
      <div class="nodes" style="grid-template-columns:${gridCols}">${nodesHtml}</div>
    </div>
  `;

  $('journey').querySelectorAll('.node').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const i = Number(btn.dataset.idx);
      scrollToIndex(i);
    });
  });
}

// ==========================
// RENDER: PANES (moments only, no overview)
// ==========================
function renderPanes(){
  const s = stories[currentStory];
  const total = moments().length;

  const panesHtml = moments().map((m, i) => {
    const dropsHtml = (m.drops || []).map(d => `
      <div class="drop" data-drop="${esc(d.id)}">
        <div class="drop-head">
          <span>${esc(d.label)}</span>
          <span class="chev">›</span>
        </div>
        <div class="drop-body">
          <div>${esc(d.body)}</div>
          <div class="drop-from">${esc(d.from)}</div>
        </div>
      </div>
    `).join('');

    return `
      <section class="pane pane-moment" data-idx="${i}" data-mid="${esc(m.id)}">
        <div class="mo-trail">
          <span class="idx">Moment ${i+1}</span>
          <span>/ ${total}</span>
        </div>
        <div class="mo-label">${esc(m.label)}</div>
        <h2 class="mo-title">${esc(m.title)}</h2>
        <p class="mo-body">${esc(m.body)}</p>
        ${m.quote ? `<blockquote class="mo-quote">"${esc(m.quote.text)}"<span class="att">— ${esc(m.quote.attrib)}</span></blockquote>` : ''}
        ${m.stat ? `<div class="mo-stat"><span class="n">${esc(m.stat.n)}</span><span class="l">${esc(m.stat.l)}</span></div>` : ''}
        ${(m.drops && m.drops.length) ? `
          <div class="ins-hdr">${m.drops.length} insight${m.drops.length>1?'s':''} — tap to expand</div>
          <div class="drops">${dropsHtml}</div>
        ` : ''}
      </section>
    `;
  }).join('');

  $('stage').innerHTML = panesHtml;

  // Drop click → expand/collapse (one open per pane)
  $('stage').querySelectorAll('.drop-head').forEach(head => {
    head.addEventListener('click', e => {
      e.stopPropagation();
      const drop = head.closest('.drop');
      const pane = drop.closest('.pane');
      const wasOpen = drop.classList.contains('open');
      pane.querySelectorAll('.drop').forEach(x => x.classList.remove('open'));
      if (!wasOpen) drop.classList.add('open');
      openDrop = wasOpen ? null : drop.dataset.drop;
    });
  });
}

// ==========================
// SCROLL → STATE SYNC (scroll-driven; more reliable than IO with nested scrolls)
// ==========================
function setupScrollSync(){
  const stage = $('stage');
  let rafId = null;
  const onScroll = () => {
    if (rafId) return;
    rafId = requestAnimationFrame(() => {
      rafId = null;
      const w = stage.clientWidth;
      if (!w) return;
      const idx = Math.round(stage.scrollLeft / w);
      if (idx !== currentPaneIdx) {
        currentPaneIdx = idx;
        applyJourneyState();
      }
    });
  };
  stage.addEventListener('scroll', onScroll, { passive: true });
}

function scrollToIndex(i){
  const stage = $('stage');
  const w = stage.clientWidth;
  // Update state first — programmatic scrolls don't reliably fire scroll events
  currentPaneIdx = i;
  applyJourneyState();
  // Vertical: ensure journey row is just below top bar
  const journey = $('journey');
  const jrRect = journey.getBoundingClientRect();
  const topBar = document.querySelector('.top');
  const topBarH = topBar ? topBar.offsetHeight : 54;
  const needVertical = jrRect.top > topBarH + 20 || jrRect.top < 0;
  if (needVertical) {
    const target = window.scrollY + jrRect.top - topBarH;
    window.scrollTo({ top: target, behavior: 'smooth' });
  }
  // Horizontal: use instant (browser smooth-scroll on elements is unreliable
  // once a window-level smooth scroll is mid-flight). Feels fine — it's a jump-to.
  const doHoriz = () => stage.scrollTo({ left: i * w, behavior: 'instant' });
  if (needVertical) setTimeout(doHoriz, 280); else doHoriz();
}

// ==========================
// APPLY JOURNEY STATE (dots, line, ask label)
// ==========================
function applyJourneyState(){
  const i = currentPaneIdx;
  const n = moments().length;

  document.querySelectorAll('.node').forEach((node, ni) => {
    node.classList.remove('active','passed');
    if (ni < i) node.classList.add('passed');
    if (ni === i) node.classList.add('active');
  });

  const line = $('jrLine');
  if (line) {
    const prog = n === 0 ? 0 : (i + 0.5) / n * 100;
    line.style.setProperty('--prog', prog + '%');
  }

  const wrap = $('stageWrap');
  wrap.classList.toggle('has-prev', i > 0);
  wrap.classList.toggle('has-next', i < n - 1);

  const m = moments()[i];
  $('askLabel').textContent = m ? `Ask about "${m.title}"` : 'Ask about this story';
}

// ==========================
// NAVIGATION (keyboard)
// ==========================
document.addEventListener('keydown', e => {
  const n = moments().length;
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    scrollToIndex(Math.min(currentPaneIdx + 1, n - 1));
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    scrollToIndex(Math.max(currentPaneIdx - 1, 0));
  } else if (e.key === 'Escape') {
    scrollToIndex(0);
  }
});

// ==========================
// TEACH-IN NUDGE (peek right on first load so user sees swipe works)
// ==========================
function teachNudge(){
  const stage = $('stage');
  if (localStorage.getItem('wz-v6-nudged-flat') === '1') return;
  if (moments().length === 0) return;
  setTimeout(() => {
    if (stage.scrollLeft > 10) return;
    let peek = 0;
    const anim = () => {
      peek += 6;
      stage.scrollLeft = peek;
      if (peek < 56) requestAnimationFrame(anim);
      else {
        setTimeout(() => {
          let back = 56;
          const anim2 = () => {
            back -= 6;
            stage.scrollLeft = Math.max(0, back);
            if (back > 0) requestAnimationFrame(anim2);
          };
          anim2();
        }, 320);
      }
    };
    requestAnimationFrame(anim);
    localStorage.setItem('wz-v6-nudged-flat', '1');
  }, 900);
}

// ==========================
// STORY SWITCH
// ==========================
$('switcher').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  const id = e.target.dataset.story;
  if (id === currentStory) return;
  currentStory = id;
  openDrop = null;
  currentPaneIdx = 0;
  $('switcher').querySelectorAll('button').forEach(b =>
    b.classList.toggle('active', b.dataset.story === id));
  boot();
});

// ==========================
// ASK
// ==========================
$('askBtn').addEventListener('click', () => toast($('askLabel').textContent));

// ==========================
// TOAST
// ==========================
let toastTimer = null;
function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ==========================
// BOOT
// ==========================
function boot(){
  renderTitleBar();
  renderCover();
  renderJourney();
  renderPanes();
  $('stage').scrollTo({ left: 0, behavior: 'auto' });
  currentPaneIdx = 0;
  setupScrollSync();
  applyJourneyState();
  teachNudge();
}
boot();

// Resize: keep pane alignment
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const stage = $('stage');
    stage.scrollTo({ left: currentPaneIdx * stage.clientWidth, behavior: 'auto' });
  }, 120);
});
</script>
